<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>PL Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 30px; }
    h1 { color: #38003c; margin-bottom: 5px; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 20px; }
    .controls { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
    button { background: #38003c; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    button:hover { background: #560060; }
    #status { font-size: 13px; color: #888; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    th { background: #38003c; color: white; padding: 12px 10px; text-align: left; font-size: 12px; text-transform: uppercase; }
    td { padding: 10px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .zone-rel td { background: #fff0f0; }
    .zone-warn td { background: #fffbe6; }
    .zone-safe td { background: #f0fff4; }
    .bar-wrap { display: flex; align-items: center; gap: 6px; }
    .bar { height: 8px; border-radius: 4px; min-width: 2px; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
    .badge-rel  { background: #ffe0e0; color: #c00; }
    .badge-warn { background: #fff3cd; color: #856404; }
    .badge-safe { background: #d4edda; color: #155724; }
    .badge-gold { background: #fff3cd; color: #856404; }
    .last-updated { font-size: 12px; color: #aaa; margin-top: 10px; text-align: right; }
  </style>
</head>
<body>

  <h1>Premier League Tracker</h1>
  <p class="subtitle">Live standings · Title % · Top 4 % · Relegation risk</p>

 <div class="controls">
  <button onclick="loadTable()">Refresh Table</button>
  <button onclick="manualRefresh()">Force Recalculate </button>
  <span id="status">Loading...</span>
</div>

  <table id="table">
    <thead>
      <tr>
        <th>#</th>
        <th>Team</th>
        <th>P</th>
        <th>W</th>
        <th>D</th>
        <th>L</th>
        <th>Pts</th>
        <th>Title Win %</th>
        <th>Top 4 Finish %</th>
        <th>Relegation Risk %</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <p class="last-updated" id="last-updated"></p>

  <script>
    const API = 'http://localhost:8080/api/league';

    function loadTable() {
      document.getElementById('status').textContent = 'Loading...';
      fetch(API + '/table')
        .then(res => {
          if (!res.ok) throw new Error('Failed to fetch table');
          return res.json();
        })
        .then(data => {
          document.getElementById('status').textContent =
            data.length + ' teams loaded';
          renderTable(data);
          document.getElementById('last-updated').textContent =
            'Last updated: ' + new Date().toLocaleTimeString();
        })
        .catch(err => {
          document.getElementById('status').textContent =
            'Error: ' + err.message;
        });
    }

    function manualRefresh() {
      document.getElementById('status').textContent = 'Recalculating...';
      fetch(API + '/refresh', { method: 'POST' })
        .then(() => setTimeout(loadTable, 1000))
        .catch(err => {
          document.getElementById('status').textContent =
            'Error: ' + err.message;
        });
    }

    function renderTable(data) {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      data.forEach(t => {
        const rowClass =
          t.status === 'RELEGATION ZONE' ? 'zone-rel'
          : t.status === 'DANGER ZONE'   ? 'zone-warn'
          : t.status === 'CHAMPIONS LEAGUE' ? 'zone-safe' : '';

        const badge =
          t.status === 'RELEGATED'         ? '<span class="badge badge-rel">Relegated</span>'
          : t.status === 'RELEGATION ZONE' ? '<span class="badge badge-rel">Relegation</span>'
          : t.status === 'DANGER ZONE'     ? '<span class="badge badge-warn">Danger</span>'
          : t.status === 'CHAMPIONS'       ? '<span class="badge badge-gold">Champions!</span>'
          : t.status === 'CHAMPIONS LEAGUE'? '<span class="badge badge-safe">CL Zone</span>'
          : t.status === 'SAFE'            ? '<span class="badge badge-safe">Safe</span>'
          : '<span style="color:#aaa; font-size:12px;">Mid Table</span>';

        tbody.innerHTML += `
          <tr class="${rowClass}">
            <td><b>${t.position}</b></td>
            <td><b>${t.team}</b></td>
            <td>${t.played}</td>
            <td>${t.won}</td>
            <td>${t.drawn}</td>
            <td>${t.lost}</td>
            <td><b>${t.points}</b></td>
            <td>
              <div class="bar-wrap">
                <div class="bar" style="width:${Math.min(t.titleChance,100)}px; background:#FFD700;"></div>
                <span>${t.titleChance}%</span>
              </div>
            </td>
            <td>
              <div class="bar-wrap">
                <div class="bar" style="width:${Math.min(t.top4Chance,100)}px; background:#00cc88;"></div>
                <span>${t.top4Chance}%</span>
              </div>
            </td>
            <td>
              <div class="bar-wrap">
                <div class="bar" style="width:${Math.min(t.relegationRisk,100)}px; background:#e00000;"></div>
                <span>${t.relegationRisk}%</span>
              </div>
            </td>
            <td>${badge}</td>
          </tr>`;
      });
    }

    // Auto refresh every 60 seconds
    loadTable();
    setInterval(loadTable, 300000);
  </script>
</body>
</html>
